name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Verify all SaMD classification records
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Verify every example record
        run: |
          for f in examples/*.json; do
            echo "=== $f"
            node src/verify.mjs "$f" || exit 1
          done
      - name: Verify build-examples.mjs would not change any file
        run: |
          node src/build-examples.mjs
          git diff --exit-code -- examples/ \
            || (echo "ERROR: examples/ have stale hashes. Run 'npm run build-examples' locally and commit." && exit 1)
